<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Clubsites</title>
<meta name="description" content="">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="font-link" href="" rel="stylesheet">

<link rel="stylesheet" href="/core/styles/tokens.css">
<link rel="stylesheet" href="/core/styles/base.css">
<link rel="stylesheet" href="/core/styles/components.css">
<link rel="stylesheet" href="/core/styles/sections.css">
<link id="theme-link" rel="stylesheet" href="">
</head>
<body class="is-loading">

<!-- Header (fijo, transparente → blur al scroll) -->
<header class="site-header" id="header">
    <div class="container header-inner">
        <a class="brand" href="#hero" aria-label="Inicio">
            <span class="brand-logo" data-logo></span>
        </a>
        <nav class="nav-desktop" aria-label="Navegación principal">
            <a href="#eventos">Eventos</a>
            <a href="#experiencia" data-nav-custom>La Experiencia</a>
            <a href="#ubicacion">Cómo llegar</a>
            <a class="nav-ig" href="#" data-link="instagram" target="_blank" rel="noopener" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                </svg>
            </a>
        </nav>
        <button class="nav-toggle" id="nav-toggle" aria-controls="mobile-menu" aria-expanded="false" aria-label="Abrir menú">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
                <line x1="4" y1="8"  x2="20" y2="8"/>
                <line x1="4" y1="16" x2="20" y2="16"/>
            </svg>
        </button>
    </div>
</header>

<!-- Mobile menu overlay -->
<nav class="mobile-menu" id="mobile-menu" aria-label="Menú mobile">
    <a href="#eventos">Eventos</a>
    <a href="#experiencia" data-nav-custom>La Experiencia</a>
    <a href="#ubicacion">Cómo llegar</a>
    <a href="#" data-link="instagram" target="_blank" rel="noopener">Instagram</a>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
    <div class="hero-bg" aria-hidden="true">
        <div class="hero-glow hero-glow-1"></div>
        <div class="hero-glow hero-glow-2"></div>
        <div class="hero-glow hero-glow-3"></div>
    </div>
    <div class="hero-content">
        <div class="hero-logo" data-logo></div>
        <h1 class="hero-title">
            <span data-text="brand-line-1"></span>
            <span class="hero-title-sub" data-text="brand-line-2"></span>
        </h1>
        <p class="hero-location" data-text="brand-location"></p>
        <div class="hero-ctas">
            <a class="btn btn-primary" href="#eventos">Ver próximos eventos</a>
            <a class="btn btn-outline" href="#" data-link="tickets" target="_blank" rel="noopener">Comprar entradas</a>
        </div>
    </div>
    <div class="hero-scroll-hint" aria-hidden="true">Scroll</div>
</section>

<main>

<!-- Próximos eventos (renderizados por events-engine) -->
<section class="section eventos" id="eventos">
    <div class="container">
        <header class="section-header">
            <h2 class="section-title">Próximos eventos</h2>
            <p class="section-subtitle">Reservá tu lugar antes que se agote.</p>
        </header>
        <div class="eventos-grid" id="eventos-grid"></div>
    </div>
</section>

<!-- Slot custom — montado por content-engine desde tenants/{id}/custom-section.html -->
<section class="section experiencia" id="experiencia" data-slot="custom"></section>

<!-- Cómo llegar -->
<section class="section ubicacion" id="ubicacion">
    <div class="container">
        <header class="section-header">
            <h2 class="section-title">Cómo llegar</h2>
        </header>
        <div class="mapa">
            <iframe id="mapa-iframe" src="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Mapa"></iframe>
        </div>
        <div class="ubicacion-info">
            <p class="ubicacion-direccion" data-text="address"></p>
            <a class="ubicacion-link" href="#" data-link="map" target="_blank" rel="noopener">
                Abrir en Google Maps
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M7 17L17 7M9 7h8v8"/>
                </svg>
            </a>
            <span class="chip-edad" data-text="age-restriction"></span>
        </div>
    </div>
</section>

<!-- Redes y contacto -->
<section class="section redes" id="redes">
    <div class="container">
        <header class="section-header">
            <h2 class="section-title">Seguinos</h2>
        </header>
        <div class="redes-content">
            <a class="ig-button" href="#" data-link="instagram" target="_blank" rel="noopener">
                <span class="ig-icon-wrap">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="18" height="18" rx="5"/>
                        <circle cx="12" cy="12" r="4"/>
                        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
                    </svg>
                </span>
                <span class="ig-handle" data-text="instagram-handle"></span>
            </a>
            <a class="redes-mail" href="#" data-link="email" data-text="email-display"></a>
        </div>
    </div>
</section>

</main>

<!-- Footer (compacto, horizontal en desktop) -->
<footer class="site-footer">
    <div class="container footer-inner">
        <div class="footer-brand">
            <span class="footer-logo" data-logo></span>
            <span class="footer-line" data-text="footer-line"></span>
        </div>
        <p class="footer-copy" data-text="footer-copy"></p>
    </div>
</footer>

<script src="/core/js/app.js" type="module"></script>
</body>
</html>
